<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jurnal Trading by Acill</title>
<style>
body{font-family:Arial;background:#121212;color:#eee;max-width:900px;margin:auto;padding:16px}
.card{background:#1e1e1e;padding:16px;border-radius:10px;margin:12px 0}
input,select,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none}
button{background:#2e7d32;color:#fff}
table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #333}
</style></head><body>
<h2>📈 Jurnal Trading by Acill</h2>
<div class="card">
<input id="pair" placeholder="Pair">
<select id="hasil"><option value="Win">Win</option><option value="Loss">Loss</option></select>
<input id="pl" type="number" step="0.01" placeholder="Profit/Loss">
<input id="note" placeholder="Catatan">
<button onclick="add()">Simpan</button>
</div>
<div class="card">
<b>Total:</b> <span id="t">0</span> |
<b>Win Rate:</b> <span id="wr">0%</span> |
<b>P/L:</b> <span id="tp">0</span>
<button onclick="clr()">Hapus Semua</button>
</div>
<div class="card"><table><thead><tr><th>Pair</th><th>Hasil</th><th>P/L</th><th>Catatan</th></tr></thead><tbody id="tb"></tbody></table></div>
<script>
let d=JSON.parse(localStorage.getItem("jt")||"[]");
function save(){localStorage.setItem("jt",JSON.stringify(d));render();}
function add(){
d.push({pair:pair.value,hasil:hasil.value,pl:parseFloat(pl.value)||0,note:note.value});
pair.value=pl.value=note.value="";save();}
function clr(){if(confirm("Hapus semua data?")){d=[];save();}}
function render(){
let w=0,tp=0;tb.innerHTML="";
d.forEach(x=>{if(x.hasil=="Win")w++;tp+=x.pl;tb.innerHTML+=`<tr><td>${x.pair}</td><td>${x.hasil}</td><td>${x.pl}</td><td>${x.note}</td></tr>`});
t.textContent=d.length;wr.textContent=d.length?((w/d.length)*100).toFixed(1)+"%":"0%";document.getElementById("tp").textContent=tp.toFixed(2);}
render();
</script></body></html>
